<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EVVO Admin</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased}
:root{
  --bg:#080810;--bg2:#0e0e1a;--bg3:#141428;
  --border:#ffffff0a;--bord2:#ffffff14;
  --text:#ffffff;--text2:#ffffffcc;--text3:#ffffff55;--text4:#ffffff22;
  --accent:#ff6a00;--grad:linear-gradient(135deg,#ff6a00,#ee0979);
  --green:#39d353;--red:#ee0979;
}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
input,button,select{font-family:inherit;border:none;outline:none}
button{cursor:pointer;background:none}

/* PÁGINAS */
.page{display:none;min-height:100vh}
.page.show{display:block}

/* LOGIN */
#page-login{display:flex;align-items:center;justify-content:center;padding:32px}
#page-login.show{display:flex}
.login-box{width:100%;max-width:360px}
.login-logo{text-align:center;margin-bottom:36px}
.login-logo svg{margin-bottom:12px}
.login-logo h1{font-size:28px;font-weight:900;color:var(--text);letter-spacing:-1px}
.login-logo p{font-size:11px;color:var(--text3);letter-spacing:.18em;text-transform:uppercase;margin-top:4px}
.form-group{margin-bottom:12px}
.form-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;display:block;margin-bottom:6px}
.form-input{width:100%;background:var(--bg2);border:1px solid var(--bord2);border-radius:12px;padding:14px 16px;color:var(--text);font-size:15px;transition:border-color .2s}
.form-input:focus{border-color:var(--accent)}
.form-input::placeholder{color:var(--text4)}
.btn-login{width:100%;background:var(--grad);border-radius:14px;padding:16px;color:#fff;font-size:14px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;margin-top:6px}
.login-error{background:#ee09791a;border:1px solid #ee097933;border-radius:10px;padding:10px 14px;font-size:12px;color:#ee0979;margin-bottom:12px;display:none}

/* APP */
#page-app{flex-direction:column}
#page-app.show{display:flex}

.topbar{background:rgba(8,8,16,.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 24px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar-left{display:flex;align-items:center;gap:10px}
.topbar-logo{display:flex;align-items:center;gap:8px}
.topbar-logo span{font-size:17px;font-weight:900;color:var(--text);letter-spacing:-1px}
.divider{width:1px;height:18px;background:var(--bord2)}
.topbar-sub{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.08em;text-transform:uppercase}
.btn-sair{background:var(--bg2);border:1px solid var(--bord2);border-radius:9px;padding:6px 14px;font-size:12px;font-weight:700;color:var(--text3)}
.btn-sair:hover{border-color:var(--red);color:var(--red)}

.main{padding:24px;max-width:1100px;margin:0 auto;width:100%}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.stat{background:var(--bg2);border-radius:14px;border:1px solid var(--border);padding:18px 20px}
.stat .lbl{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
.stat .val{font-size:30px;font-weight:900;color:var(--text);letter-spacing:-1px;line-height:1}

/* TOOLBAR */
.toolbar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center;justify-content:space-between}
.toolbar-left{display:flex;gap:8px;flex:1;flex-wrap:wrap}
.search{flex:1;min-width:180px;background:var(--bg2);border:1px solid var(--bord2);border-radius:10px;padding:9px 14px;color:var(--text);font-size:13px}
.search::placeholder{color:var(--text4)}
.sel{background:var(--bg2);border:1px solid var(--bord2);border-radius:10px;padding:9px 12px;color:var(--text);font-size:12px;font-weight:600}
.sel option{background:var(--bg2)}
.btn-novo{background:var(--grad);border-radius:10px;padding:9px 18px;color:#fff;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;white-space:nowrap;display:flex;align-items:center;gap:6px}

/* TABELA */
.table{background:var(--bg2);border-radius:14px;border:1px solid var(--border);overflow:hidden}
.thead{display:grid;grid-template-columns:2fr 1.2fr 1fr 1fr 1fr 130px;border-bottom:1px solid var(--border)}
.th{padding:11px 14px;font-size:10px;font-weight:700;color:var(--text4);text-transform:uppercase;letter-spacing:.08em}
.tbody{display:flex;flex-direction:column}
.trow{display:grid;grid-template-columns:2fr 1.2fr 1fr 1fr 1fr 130px;border-bottom:1px solid var(--border);align-items:center;transition:background .15s}
.trow:last-child{border-bottom:none}
.trow:hover{background:var(--bg3)}
.td{padding:12px 14px;font-size:13px;color:var(--text2)}
.u-wrap{display:flex;align-items:center;gap:10px}
.avatar{width:30px;height:30px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:#fff;flex-shrink:0}
.u-name{font-size:13px;font-weight:700;color:var(--text)}
.u-handle{font-size:11px;color:var(--text3);margin-top:1px}
.badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:800;padding:3px 9px;border-radius:20px}
.b-pro{background:var(--grad);color:#fff}
.b-free{background:var(--border);border:1px solid var(--bord2);color:var(--text3)}
.b-ativo{background:#39d35318;color:var(--green);border:1px solid #39d35330}
.b-bloq{background:#ee097918;color:var(--red);border:1px solid #ee097930}
.dot{width:5px;height:5px;border-radius:50%;background:currentColor}
.actions{display:flex;gap:5px;justify-content:flex-end;padding-right:14px}
.btn-act{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;border:1px solid var(--bord2);background:var(--bg3);transition:all .15s}
.btn-act svg{width:13px;height:13px;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;stroke:var(--text3)}
.btn-act:hover{border-color:var(--accent)}
.btn-act:hover svg{stroke:var(--accent)}
.btn-act.danger:hover{border-color:var(--red)}
.btn-act.danger:hover svg{stroke:var(--red)}
.empty{padding:36px;text-align:center;color:var(--text3);font-size:13px}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(10px);display:none;align-items:center;justify-content:center;padding:20px;z-index:100}
.overlay.show{display:flex}
.modal{background:var(--bg2);border-radius:18px;border:1px solid var(--bord2);width:100%;max-width:400px;padding:26px}
.modal h3{font-size:17px;font-weight:900;color:var(--text);letter-spacing:-.3px;margin-bottom:5px}
.modal p{font-size:13px;color:var(--text3);margin-bottom:20px;line-height:1.5}
.modal .form-input{margin-bottom:10px}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:12px}
.btn-cancel{background:var(--bg3);border:1px solid var(--bord2);border-radius:10px;padding:9px 16px;color:var(--text2);font-size:12px;font-weight:700}
.btn-confirm{background:var(--grad);border-radius:10px;padding:9px 18px;color:#fff;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.06em}
.btn-danger{background:#ee097922;border:1px solid #ee097944;border-radius:10px;padding:9px 18px;color:var(--red);font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.06em}
.merr{background:#ee09791a;border:1px solid #ee097933;border-radius:8px;padding:9px 12px;font-size:12px;color:#ee0979;margin-bottom:10px;display:none}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--bord2);border-radius:10px;padding:11px 20px;font-size:13px;font-weight:700;color:var(--text);white-space:nowrap;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

@media(max-width:768px){
  .stats{grid-template-columns:1fr 1fr}
  .thead,.trow{grid-template-columns:2fr 1fr 1fr 100px}
  .th:nth-child(3),.td:nth-child(3),.th:nth-child(5),.td:nth-child(5){display:none}
  .main{padding:14px}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="page-login" class="page">
  <div class="login-box">
    <div class="login-logo">
      <svg width="56" height="56" viewBox="0 0 56 56" fill="none">
        <rect width="56" height="56" rx="15" fill="url(#g1)"/>
        <defs><linearGradient id="g1" x1="0" y1="0" x2="56" y2="56"><stop offset="0%" stop-color="#ff6a00"/><stop offset="100%" stop-color="#ee0979"/></linearGradient></defs>
        <path d="M14 19 L28 40 L42 19" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity=".35"/>
        <path d="M19 19 L28 35 L37 19" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <circle cx="28" cy="15" r="3" fill="white"/>
      </svg>
      <h1>EVVO</h1>
      <p>Painel Admin</p>
    </div>
    <div class="login-error" id="login-err"></div>
    <div class="form-group">
      <label class="form-label">Usuário</label>
      <input class="form-input" type="text" id="inp-user" placeholder="usuário" autocapitalize="none" autocomplete="username">
    </div>
    <div class="form-group">
      <label class="form-label">Senha</label>
      <input class="form-input" type="password" id="inp-pass" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-login" id="btn-entrar" onclick="doLogin()">Entrar</button>
  </div>
</div>

<!-- APP -->
<div id="page-app" class="page">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-logo">
        <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
          <rect width="26" height="26" rx="7" fill="url(#g2)"/>
          <defs><linearGradient id="g2" x1="0" y1="0" x2="26" y2="26"><stop offset="0%" stop-color="#ff6a00"/><stop offset="100%" stop-color="#ee0979"/></linearGradient></defs>
          <path d="M6 9 L13 19 L20 9" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity=".35"/>
          <path d="M9 9 L13 16 L17 9" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <circle cx="13" cy="7" r="1.5" fill="white"/>
        </svg>
        <span>EVVO</span>
      </div>
      <div class="divider"></div>
      <span class="topbar-sub">Admin</span>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <span style="font-size:12px;color:var(--text3);font-weight:600" id="lbl-admin"></span>
      <button class="btn-sair" onclick="doLogout()">Sair</button>
    </div>
  </div>

  <div class="main">
    <div class="stats">
      <div class="stat"><div class="lbl">Total usuários</div><div class="val" id="s-total">—</div></div>
      <div class="stat"><div class="lbl">Plano Pro</div><div class="val" id="s-pro">—</div></div>
      <div class="stat"><div class="lbl">Ativos</div><div class="val" id="s-ativos">—</div></div>
      <div class="stat"><div class="lbl">Bloqueados</div><div class="val" id="s-bloq">—</div></div>
    </div>

    <div class="toolbar">
      <div class="toolbar-left">
        <input class="search" type="text" placeholder="Buscar nome ou usuário..." oninput="filtrar()" id="busca">
        <select class="sel" id="fil-plano" onchange="filtrar()">
          <option value="">Todos os planos</option>
          <option value="pro">Pro</option>
          <option value="free">Free</option>
        </select>
        <select class="sel" id="fil-status" onchange="filtrar()">
          <option value="">Todos os status</option>
          <option value="ativo">Ativos</option>
          <option value="bloqueado">Bloqueados</option>
        </select>
      </div>
      <button class="btn-novo" onclick="abrirNovo()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Novo usuário
      </button>
    </div>

    <div class="table">
      <div class="thead">
        <div class="th">Usuário</div>
        <div class="th">Cadastro</div>
        <div class="th">Plano</div>
        <div class="th">Status</div>
        <div class="th">Treinos</div>
        <div class="th" style="text-align:right;padding-right:22px">Ações</div>
      </div>
      <div class="tbody" id="tbody">
        <div class="empty">Carregando...</div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL NOVO -->
<div class="overlay" id="m-novo">
  <div class="modal">
    <h3>Novo usuário</h3>
    <p>Crie um acesso manualmente.</p>
    <div class="merr" id="m-novo-err"></div>
    <input class="form-input" type="text" id="n-nome" placeholder="Nome completo">
    <input class="form-input" type="text" id="n-user" placeholder="usuário (sem espaços)" autocapitalize="none">
    <input class="form-input" type="text" id="n-pass" placeholder="senha (mínimo 6 caracteres)">
    <select class="form-input sel" id="n-plano" style="padding:14px 16px">
      <option value="free">Free</option>
      <option value="pro">Pro</option>
    </select>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="fechar('m-novo')">Cancelar</button>
      <button class="btn-confirm" onclick="criarUsuario()">Criar</button>
    </div>
  </div>
</div>

<!-- MODAL EDITAR -->
<div class="overlay" id="m-editar">
  <div class="modal">
    <h3>Editar usuário</h3>
    <p id="m-editar-desc"></p>
    <input type="hidden" id="e-id">
    <div class="form-group">
      <label class="form-label">Plano</label>
      <select class="form-input sel" id="e-plano" style="padding:14px 16px">
        <option value="free">Free</option>
        <option value="pro">Pro</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Status</label>
      <select class="form-input sel" id="e-status" style="padding:14px 16px">
        <option value="ativo">Ativo</option>
        <option value="bloqueado">Bloqueado</option>
      </select>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="fechar('m-editar')">Cancelar</button>
      <button class="btn-confirm" onclick="salvarEdicao()">Salvar</button>
    </div>
  </div>
</div>

<!-- MODAL DELETAR -->
<div class="overlay" id="m-del">
  <div class="modal">
    <h3>Excluir usuário</h3>
    <p id="m-del-desc"></p>
    <input type="hidden" id="d-id">
    <div class="modal-btns">
      <button class="btn-cancel" onclick="fechar('m-del')">Cancelar</button>
      <button class="btn-danger" onclick="confirmarDel()">Excluir</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPA_URL  = 'https://igxvsboqqmwzzyzgsbjw.supabase.co';
const SUPA_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlneHZzYm9xcW13enp5emdzYmp3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4Njc3MTgsImV4cCI6MjA5NzQ0MzcxOH0.ClLggfxlLEMqRdqqcbcugbMcUfviJAEMORitiku3MUw';
const ADMIN     = 'jhony';
const sb        = supabase.createClient(SUPA_URL, SUPA_ANON);

let usuarios = [];

// ── NAVEGAÇÃO ──
function ir(pag) {
  document.querySelectorAll('.page').forEach(p => {
    p.style.display = 'none';
    p.classList.remove('show');
  });
  const el = document.getElementById('page-' + pag);
  if (pag === 'login') {
    el.style.display = 'flex';
  } else {
    el.style.display = 'flex';
    el.style.flexDirection = 'column';
  }
  el.classList.add('show');
}

// ── INIT ──
async function init() {
  ir('login'); // começa na login por padrão
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    const u = session.user.email.replace('@evvo.app','');
    if (u === ADMIN) {
      document.getElementById('lbl-admin').textContent = '@' + u;
      ir('app');
      carregarDados();
    } else {
      await sb.auth.signOut();
    }
  }
}

// ── LOGIN ──
async function doLogin() {
  const user = document.getElementById('inp-user').value.trim().toLowerCase();
  const pass = document.getElementById('inp-pass').value;
  const err  = document.getElementById('login-err');
  err.style.display = 'none';

  if (!user || !pass) {
    err.textContent = 'Preencha usuário e senha.';
    err.style.display = 'block';
    return;
  }

  if (user !== ADMIN) {
    err.textContent = 'Acesso negado.';
    err.style.display = 'block';
    return;
  }

  const btn = document.getElementById('btn-entrar');
  btn.textContent = 'Entrando...';
  btn.disabled = true;

  const { data, error } = await sb.auth.signInWithPassword({
    email: user + '@evvo.app',
    password: pass
  });

  btn.textContent = 'Entrar';
  btn.disabled = false;

  if (error) {
    err.textContent = 'Usuário ou senha incorretos.';
    err.style.display = 'block';
    return;
  }

  document.getElementById('lbl-admin').textContent = '@' + user;
  ir('app');
  carregarDados();
}

async function doLogout() {
  await sb.auth.signOut();
  ir('login');
}

// Permitir Enter no campo senha
document.getElementById('inp-pass').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

// ── DADOS ──
async function carregarDados() {
  const { data: perfis } = await sb.from('perfis')
    .select('*')
    .order('created_at', { ascending: false });

  if (!perfis) return;

  const { data: sessoes } = await sb.from('sessoes')
    .select('user_id')
    .not('finalizado_em', 'is', null);

  const mapa = {};
  (sessoes || []).forEach(s => { mapa[s.user_id] = (mapa[s.user_id] || 0) + 1; });

  usuarios = perfis.map(p => ({
    ...p,
    username: p.email.replace('@evvo.app',''),
    treinos: mapa[p.id] || 0,
  }));

  atualizarStats();
  renderTabela(usuarios);
}

function atualizarStats() {
  document.getElementById('s-total').textContent  = usuarios.length;
  document.getElementById('s-pro').textContent    = usuarios.filter(u => u.plano === 'pro').length;
  document.getElementById('s-ativos').textContent = usuarios.filter(u => u.status !== 'bloqueado').length;
  document.getElementById('s-bloq').textContent   = usuarios.filter(u => u.status === 'bloqueado').length;
}

function renderTabela(lista) {
  const tbody = document.getElementById('tbody');
  if (!lista.length) {
    tbody.innerHTML = '<div class="empty">Nenhum usuário encontrado</div>';
    return;
  }
  tbody.innerHTML = lista.map(u => {
    const ini   = (u.nome || '?').charAt(0).toUpperCase();
    const data  = new Date(u.created_at).toLocaleDateString('pt-BR', { day:'2-digit', month:'short', year:'2-digit' });
    const bloq  = u.status === 'bloqueado';
    const pro   = u.plano === 'pro';
    const ne    = (u.nome || '').replace(/'/g,"\\'");
    return `
    <div class="trow">
      <div class="td">
        <div class="u-wrap">
          <div class="avatar">${ini}</div>
          <div>
            <div class="u-name">${u.nome || '—'}</div>
            <div class="u-handle">@${u.username}</div>
          </div>
        </div>
      </div>
      <div class="td" style="font-size:11px;color:var(--text3)">${data}</div>
      <div class="td"><span class="badge ${pro?'b-pro':'b-free'}">${pro?'⭐ Pro':'Free'}</span></div>
      <div class="td"><span class="badge ${bloq?'b-bloq':'b-ativo'}"><span class="dot"></span>${bloq?'Bloqueado':'Ativo'}</span></div>
      <div class="td" style="font-weight:700;color:${u.treinos>0?'var(--text)':'var(--text4)'}">${u.treinos}</div>
      <div class="td actions">
        <button class="btn-act" onclick="abrirEditar('${u.id}','${ne}','${u.plano}','${u.status||'ativo'}')" title="Editar">
          <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        <button class="btn-act ${bloq?'':'danger'}" onclick="${bloq?'desbloquear':'bloquear'}('${u.id}')" title="${bloq?'Desbloquear':'Bloquear'}">
          <svg viewBox="0 0 24 24">${bloq
            ? '<rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>'
            : '<rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/>'
          }</svg>
        </button>
        <button class="btn-act danger" onclick="abrirDel('${u.id}','${ne}')" title="Excluir">
          <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
        </button>
      </div>
    </div>`;
  }).join('');
}

// ── FILTRO ──
function filtrar() {
  const q  = document.getElementById('busca').value.toLowerCase();
  const fp = document.getElementById('fil-plano').value;
  const fs = document.getElementById('fil-status').value;
  renderTabela(usuarios.filter(u => {
    const mQ = !q || u.nome?.toLowerCase().includes(q) || u.username.includes(q);
    const mP = !fp || u.plano === fp;
    const mS = !fs || (u.status || 'ativo') === fs;
    return mQ && mP && mS;
  }));
}

// ── AÇÕES RÁPIDAS ──
async function bloquear(id) {
  await sb.from('perfis').update({ status:'bloqueado' }).eq('id', id);
  toast('Usuário bloqueado');
  await carregarDados();
}
async function desbloquear(id) {
  await sb.from('perfis').update({ status:'ativo' }).eq('id', id);
  toast('Usuário desbloqueado');
  await carregarDados();
}

// ── MODAIS ──
function abrir(id) { document.getElementById(id).classList.add('show'); }
function fechar(id) { document.getElementById(id).classList.remove('show'); }

['m-novo','m-editar','m-del'].forEach(id => {
  document.getElementById(id).addEventListener('click', function(e) {
    if (e.target === this) fechar(id);
  });
});

function abrirNovo() {
  ['n-nome','n-user','n-pass'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('n-plano').value = 'free';
  document.getElementById('m-novo-err').style.display = 'none';
  abrir('m-novo');
}

async function criarUsuario() {
  const nome  = document.getElementById('n-nome').value.trim();
  const user  = document.getElementById('n-user').value.trim().toLowerCase().replace(/\s+/g,'');
  const pass  = document.getElementById('n-pass').value;
  const plano = document.getElementById('n-plano').value;
  const err   = document.getElementById('m-novo-err');
  err.style.display = 'none';

  if (!nome || !user || !pass) { err.textContent = 'Preencha todos os campos.'; err.style.display = 'block'; return; }
  if (pass.length < 6) { err.textContent = 'Senha mínimo 6 caracteres.'; err.style.display = 'block'; return; }

  const { error } = await sb.auth.signUp({
    email: user + '@evvo.app',
    password: pass,
    options: { data: { nome } }
  });

  if (error) {
    err.textContent = error.message.includes('already') ? 'Usuário já existe.' : error.message;
    err.style.display = 'block';
    return;
  }

  if (plano === 'pro') {
    setTimeout(async () => {
      const { data: p } = await sb.from('perfis').select('id').eq('email', user+'@evvo.app').single();
      if (p) await sb.from('perfis').update({ plano:'pro' }).eq('id', p.id);
      await carregarDados();
    }, 1500);
  }

  fechar('m-novo');
  toast('Usuário criado!');
  setTimeout(() => carregarDados(), 1500);
}

function abrirEditar(id, nome, plano, status) {
  document.getElementById('e-id').value = id;
  document.getElementById('m-editar-desc').textContent = 'Editando: ' + nome;
  document.getElementById('e-plano').value  = plano;
  document.getElementById('e-status').value = status;
  abrir('m-editar');
}

async function salvarEdicao() {
  const id     = document.getElementById('e-id').value;
  const plano  = document.getElementById('e-plano').value;
  const status = document.getElementById('e-status').value;
  const { error } = await sb.from('perfis').update({ plano, status }).eq('id', id);
  if (!error) { fechar('m-editar'); toast('Salvo!'); await carregarDados(); }
  else toast('Erro ao salvar');
}

function abrirDel(id, nome) {
  document.getElementById('d-id').value = id;
  document.getElementById('m-del-desc').textContent = `Excluir "${nome}"? Esta ação é permanente.`;
  abrir('m-del');
}

async function confirmarDel() {
  const id = document.getElementById('d-id').value;
  const { error } = await sb.from('perfis').delete().eq('id', id);
  if (!error) { fechar('m-del'); toast('Excluído'); await carregarDados(); }
  else toast('Erro ao excluir');
}

// ── TOAST ──
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

init();

// DEBUG VISIVEL NA TELA
async function debugVisivel() {
  const div = document.createElement('div');
  div.id = 'debug-box';
  div.style.cssText = 'position:fixed;bottom:10px;right:10px;background:#0e0e1a;border:1px solid #ff6a00;padding:14px;border-radius:10px;font-size:11px;color:#fff;z-index:9999;max-width:300px;line-height:1.6';
  document.body.appendChild(div);

  function dbg(msg) {
    div.innerHTML += msg + '<br>';
    console.log('[DEBUG]', msg);
  }

  dbg('1. Iniciando...');

  // Verifica páginas
  const pl = document.getElementById('page-login');
  const pa = document.getElementById('page-app');
  dbg('2. page-login: ' + (pl ? 'OK' : 'NAO ENCONTRADO'));
  dbg('3. page-app: ' + (pa ? 'OK' : 'NAO ENCONTRADO'));
  dbg('4. page-login display: ' + (pl ? pl.style.display || 'css' : '—'));
  dbg('5. page-app display: ' + (pa ? pa.style.display || 'css' : '—'));

  // Verifica sessao
  const { data: { session } } = await sb.auth.getSession();
  dbg('6. Sessao: ' + (session ? session.user.email : 'nenhuma'));

  if (session) {
    dbg('7. Chamando ir(app)...');
    ir('app');
    dbg('8. page-app display apos ir(): ' + pa.style.display);
  } else {
    dbg('7. Chamando ir(login)...');
    ir('login');
    dbg('8. page-login display apos ir(): ' + pl.style.display);
  }
}

setTimeout(debugVisivel, 500);
</script>
